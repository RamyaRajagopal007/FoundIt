<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FoundIt | Login</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #fff;
      padding: 40px;
      width: 350px;
      border-radius: 12px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      text-align: center;
    }

    .login-card h1 {
      margin-bottom: 10px;
      color: #333;
    }

    .login-card p {
      color: #777;
      margin-bottom: 25px;
    }

    .login-card input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    .login-card button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 8px;
      background: #667eea;
      color: #fff;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .login-card button:hover {
      background: #556cd6;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="logo">🔍 FoundIt</div>
    <h1>Welcome Back</h1>
    <p>Login to continue</p>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
  </div>

  <script src="auth.js"></script>
</body>
</html>
